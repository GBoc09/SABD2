services:

  ## NIFI
  nifi:
    build:
      context: ./nifi
      dockerfile: Dockerfile

    image: custom-nifi:2.4.0

    container_name: nifi
    hostname: nifi

    networks:
      - streaming_processing_network

    ports:
      - "8443:8443"

    environment:
      - NIFI_WEB_HTTPS_PORT=8443
      - NIFI_HOME=/opt/nifi/nifi-current

      - HADOOP_CONF_DIR=/opt/nifi/nifi-current/conf/hadoop

      - SINGLE_USER_CREDENTIALS_USERNAME=${NIFI_USERNAME}
      - SINGLE_USER_CREDENTIALS_PASSWORD=${NIFI_PASSWORD}
      - NIFI_SENSITIVE_PROPS_KEY=${NIFI_SENSITIVE_PROPS_KEY}

    volumes:
      - ./nifi/dataset:/opt/nifi/nifi-current/input_csv
      - ./hadoop/hadoop-conf:/opt/nifi/nifi-current/conf/hadoop
      - ./nifi/conf/flow.json.gz:/opt/nifi/nifi-current/conf/flow.json.gz

    depends_on:
      - namenode
      - datanode
      - kafka

    
  ## HDFS 
  ## HADOOP NAMENODE
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8

    container_name: namenode
    hostname: namenode

    networks:
      - streaming_processing_network

    ports:
      - "9870:9870"
      - "9000:9000"

    environment:
      - CLUSTER_NAME=test


    volumes:
      - namenode:/hadoop/dfs/name
      - ./hadoop/hadoop-conf:/opt/hadoop-conf

  ## HADOOP DATANODE
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8

    container_name: datanode
    hostname: datanode

    networks:
      - streaming_processing_network

    environment:
      SERVICE_PRECONDITION: "namenode:9870"


    volumes:
      - datanode:/hadoop/dfs/data
      - ./hadoop/hadoop-conf:/opt/hadoop-conf

    depends_on:
      - namenode

  ## KAFKA 
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka

    hostname: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: >
        PLAINTEXT://:9092,
        CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@kafka:9093

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    networks:
      - streaming_processing_network
    volumes:
      - kafka-data:/tmp/kraft-combined-logs


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    depends_on:
      - kafka

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local

      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    networks:
      - streaming_processing_network






networks:
  streaming_processing_network:
    driver: bridge
    name: stream_processing_network
  
volumes:
  namenode:
  datanode:
  kafka-data: