services:

  ## NIFI
  nifi:
    build:
      context: .
      dockerfile: nifi/Dockerfile

    image: custom-nifi:2.4.0

    container_name: nifi
    hostname: nifi

    networks:
      - streaming_processing_network

    ports:
      - "8443:8443"

    environment:
      - NIFI_WEB_HTTPS_PORT=8443
      - NIFI_HOME=/opt/nifi/nifi-current

      - HADOOP_CONF_DIR=/opt/nifi/nifi-current/conf/hadoop

      - SINGLE_USER_CREDENTIALS_USERNAME=${NIFI_USERNAME}
      - SINGLE_USER_CREDENTIALS_PASSWORD=${NIFI_PASSWORD}
      - NIFI_SENSITIVE_PROPS_KEY=${NIFI_SENSITIVE_PROPS_KEY}

    volumes:
      - ./nifi/dataset:/opt/nifi/nifi-current/input_csv
      - ./hadoop/hadoop-conf:/opt/nifi/nifi-current/conf/hadoop

    depends_on:
      - namenode
      - datanode
      - kafka

    
  ## HDFS 
  ## HADOOP NAMENODE
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8

    container_name: namenode
    hostname: namenode

    networks:
      - streaming_processing_network

    ports:
      - "9870:9870"
      - "8020:8020"

    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
      - HDFS_CONF_dfs_permissions_enabled=false

    volumes:
      - namenode:/hadoop/dfs/name
      - ./hadoop/hadoop-conf:/opt/hadoop-conf

  ## HADOOP DATANODE
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8

    container_name: datanode
    hostname: datanode

    networks:
      - streaming_processing_network

    environment:
      SERVICE_PRECONDITION: "namenode:9870"
      CORE_CONF_fs_defaultFS: "hdfs://namenode:8020"
      HDFS_CONF_dfs_replication: "1"
      HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"
      HDFS_CONF_dfs_permissions_enabled: "false"


    volumes:
      - datanode:/hadoop/dfs/data
      - ./hadoop/hadoop-conf:/opt/hadoop-conf

    depends_on:
      - namenode


  ## REPLAY
  replay:
    build:
      context: ..
      dockerfile: docker/replay/Dockerfile

    container_name: replay

    hostname: replay

    environment:
      - HDFS_URI=hdfs://namenode:8020
      - HDFS_FILE_PATH=/nifi_output/merge.csv

      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=flights
      - KAFKA_PARTITIONS=2
      - REPLAY_PRODUCER_COUNT=4

    networks:
      - streaming_processing_network

    depends_on:
      - namenode
      - kafka



  ## KAFKA 
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    user: "0:0"

    hostname: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: >
        PLAINTEXT://:9092,
        CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@kafka:9093

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    networks:
      - streaming_processing_network


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    depends_on:
      - kafka

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local

      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    networks:
      - streaming_processing_network


  ## Flink 
  jobmanager:
    image: flink:1.19
    container_name: jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager

    networks:
      - streaming_processing_network

  taskmanager:
    image: flink:1.19
    container_name: taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
    networks:
      - streaming_processing_network

  flink-job:
    image: flink:1.19
    container_name: flink-job

    depends_on:
      - jobmanager
      - taskmanager
      - kafka

    networks:
      - streaming_processing_network

    volumes:
      - ../target/analisi-voli-1.0.0.jar:/opt/flink/usrlib/analisi-voli-1.0.0.jar

    command: >
      bash -c "
      sleep 10 &&
      flink run -d
      -m jobmanager:8081
      -c it.uniroma2.sabd.flink.FlinkKafkaConsumerJob
      /opt/flink/usrlib/analisi-voli-1.0.0.jar
      --brokers kafka:9092
      --topic flights
      --parallelism 4
      "

  ## Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - streaming_processing_network
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana-storage:/var/lib/grafana



  
networks:
  streaming_processing_network:
    driver: bridge
    name: stream_processing_network
  
volumes:
  namenode:
  datanode:
  influxdb-storage:
  grafana-storage:


